name: qurilish

services:
  db:
    image: postgres:16-alpine
    container_name: qurilish_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qurilish_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: qurilish_server
    restart: unless-stopped
    # Not exposed to the outside — Nginx proxies to it internally
    environment:
      PORT: 5000
      NODE_ENV: production
      HTTPS_ENABLED: "false"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: qurilish_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: https://192.168.43.25
    depends_on:
      - db
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Replace SERVER_IP with your actual server IP address
        VITE_SERVER_URL: https://192.168.43.25:8081
    container_name: qurilish_client
    restart: unless-stopped
    ports:
      - "8081:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - server

volumes:
  postgres_data:
